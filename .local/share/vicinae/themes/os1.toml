# Generated from .config/theme/palette.json by scripts/generate-theme.
[meta]
name = "os1"
description = "Neutral nested surfaces"
variant = "light"
inherits = "vicinae-light"

[colors.core]
accent = "#171717"
accent_foreground = "#FFFFFF"
background = "#FAFAFA"
foreground = "#171717"
secondary_background = "#FCFCFC"
border = "#E5E5E5"

[colors.main_window]
border = "colors.core.border"
footer = { background = "#FCFCFC" }

[colors.settings_window]
border = "colors.core.border"

[colors.accents]
blue = "#3F6F9F"
green = "#3F7D58"
magenta = "#7C5E92"
orange = "#916622"
red = "#B84E4E"
yellow = "#916622"
cyan = "#3E7B7D"
purple = "#7C5E92"

[colors.shortcut]
border = "colors.core.border"

[colors.text]
default = "colors.core.foreground"
muted = "#737373"
danger = "#B84E4E"
success = "#3F7D58"
placeholder = "#A3A3A3"
selection = { background = "#E5E5E5", foreground = "#171717" }

[colors.text.links]
default = "#3F6F9F"
visited = "#7C5E92"

[colors.input]
border = "#E5E5E5"
border_focus = "#A3A3A3"
border_error = "#B84E4E"

[colors.button.primary]
background = "#171717"
foreground = "#FFFFFF"
hover = { background = "#D4D4D4" }
focus = { outline = "#A3A3A3" }

[colors.list.item.selection]
background = "#E5E5E5"
foreground = "#171717"
secondary_background = "#F5F5F5"
secondary_foreground = "#525252"

[colors.grid.item]
background = "#FCFCFC"
hover = { outline = "#A3A3A3" }
selection = { outline = "#D4D4D4" }

[colors.scrollbars]
background = "#D4D4D4"

[colors.loading]
bar = "#171717"
spinner = "#171717"
