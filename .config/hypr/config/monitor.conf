# Monitor wiki https://wiki.hypr.land/Configuring/Monitors/

monitor = DP-1, preferred, auto, 1.2

# LG dual-mode helper script:
# - Super+Ctrl+M toggles 4K240 <-> 1080p480
# - Super+Ctrl+Shift+M reapplies the current profile (use after OSD mode button)
# Override defaults with env vars if needed:
# HYPR_DUALMODE_OUTPUT, HYPR_DUALMODE_SCALE_4K, HYPR_DUALMODE_SCALE_1080

# If you need to scale things like steam etc, please uncomment these lines.
# Adjust GDK_SCALE accordingly to your liking.
xwayland {
 force_zero_scaling = true       # Unscale XWayland
}

# env = GDK_SCALE, 1.25                   # GDK Scaling Factor
