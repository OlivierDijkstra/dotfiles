# Generated from .config/theme/palette.json by scripts/generate-theme.
[meta]
name = "os1-night"
description = "Neutral nested surfaces"
variant = "dark"
inherits = "vicinae-dark"

[colors.core]
accent = "#F5F5F5"
accent_foreground = "#171717"
background = "#171717"
foreground = "#F5F5F5"
secondary_background = "#1E1E1E"
border = "#333333"

[colors.main_window]
border = "colors.core.border"
footer = { background = "#1E1E1E" }

[colors.settings_window]
border = "colors.core.border"

[colors.accents]
blue = "#7CA9D8"
green = "#76B78B"
magenta = "#A994C3"
orange = "#D2A85B"
red = "#E57373"
yellow = "#D2A85B"
cyan = "#73B5B7"
purple = "#A994C3"

[colors.shortcut]
border = "colors.core.border"

[colors.text]
default = "colors.core.foreground"
muted = "#A3A3A3"
danger = "#E57373"
success = "#76B78B"
placeholder = "#737373"
selection = { background = "#414141", foreground = "#F5F5F5" }

[colors.text.links]
default = "#7CA9D8"
visited = "#A994C3"

[colors.input]
border = "#333333"
border_focus = "#737373"
border_error = "#E57373"

[colors.button.primary]
background = "#F5F5F5"
foreground = "#171717"
hover = { background = "#484848" }
focus = { outline = "#737373" }

[colors.list.item.selection]
background = "#414141"
foreground = "#F5F5F5"
secondary_background = "#2C2C2C"
secondary_foreground = "#D4D4D4"

[colors.grid.item]
background = "#1E1E1E"
hover = { outline = "#737373" }
selection = { outline = "#484848" }

[colors.scrollbars]
background = "#484848"

[colors.loading]
bar = "#F5F5F5"
spinner = "#F5F5F5"
